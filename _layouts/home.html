---
layout: default
---

<!-- ⭐ HERO SECTION WITH DAY ↔ NIGHT CROWN -->
<section class="hero-section" style="text-align:center; margin-top: 40px;">

  <div class="hero-crown-wrapper">
    <img src="{{ '/assets/img/day-crown.svg' | relative_url }}"
         class="hero-crown-img hero-crown-day"
         alt="Crown Creatives Day Crown">

    <img src="{{ '/assets/img/night-crown.svg' | relative_url }}"
         class="hero-crown-img hero-crown-night"
         alt="Crown Creatives Night Crown">
  </div>

  <h1 class="hero-title" style="margin-top: 260px;">
    {{ site.title }}
  </h1>

  <p class="hero-tagline">
    {{ site.tagline }}
  </p>

</section>

<!-- ⭐ GALLERY LANES -->
<section class="gallery-section">
  {{ content }}
</section>

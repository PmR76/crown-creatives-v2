<!DOCTYPE html>
<html lang="en">

  {% include head.html %}

<body class="home" id="top" data-theme="day">

  <!-- HEADER -->
  {% include header.html %}

  <!-- HERO CROWN (centre, protected space) -->
  <section class="home-hero">
    <img 
      src="{{ '/assets/img/day-crown.svg' | relative_url }}" 
      alt="Day Crown" 
      class="home-crown" 
      id="crown-img">
  </section>

  <!-- MAIN CONTENT (CARDS) -->
  <main class="site-content">
    {{ content }}
  </main>

  <!-- HERO GALLERY LANES (LEFT + RIGHT ONLY) -->
  <div class="hero-gallery">
    <div class="gallery-lane gallery-left"></div>
    <div class="gallery-lane gallery-right"></div>
  </div>

  <!-- MAGICAL INSPIRATIONAL TICKER -->
  <div class="inspiration-ticker">
    <div class="ticker-track">
      <span>✨ Imagination becomes reality ✨ Creativity is your superpower ✨ Every idea is a spark of magic ✨ Artistry transforms the ordinary ✨ Believe boldly — create fearlessly ✨</span>
    </div>
  </div>

  <!-- FOOTER -->
  {% include footer.html %}

  <!-- THEME ENGINE + HERO GALLERY ENGINE -->
  <script src="{{ '/assets/js/magic.js' | relative_url }}"></script>

</body>
</html>

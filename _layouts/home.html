---
layout: default
---

<!-- ⭐ HERO SECTION -->
<section class="hero-section">

  <!-- Magical Background Engine (already in your default layout) -->
  <!-- This layout only handles the hero crowns + title -->

  <div class="hero-crown-wrapper">
    <img src="{{ '/assets/img/day-crown.svg' | relative_url }}"
         class="hero-crown-img hero-crown-day"
         alt="Crown Creatives Day Crown">

    <img src="{{ '/assets/img/night-crown.svg' | relative_url }}"
         class="hero-crown-img hero-crown-night"
         alt="Crown Creatives Night Crown">
  </div>

  <h1 class="hero-title">{{ site.title }}</h1>
  <p class="hero-tagline">{{ site.tagline }}</p>

</section>


<!-- ⭐ GALLERY LANES / PAGE CONTENT -->
<section class="gallery-section">
  {{ content }}
</section>

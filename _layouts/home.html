---
layout: default
---

<div class="home-hero">

  <header class="site-header">
    {% include header.html %}
  </header>

  <div class="hero-inner">

    <!-- HERO CROWN (DAY + NIGHT STACKED FOR TRANSITION) -->
    <div class="hero-crown">
      <img src="{{ '/assets/img/day-crown.svg' | relative_url }}" class="crown crown-day" alt="Crown Creatives Day Crown">
      <img src="{{ '/assets/img/night-crown.svg' | relative_url }}" class="crown crown-night" alt="Crown Creatives Night Crown">
    </div>

    <!-- HERO TAGLINE -->
    <h1 class="hero-title">CROWN CREATIVES</h1>
    <p class="hero-subtitle">ARTISTRY • RESILIENCE • IMAGINATION</p>

    <!-- OPTIONAL HERO CTA OR CONTENT -->
    <div class="hero-content">
      {{ content }}
    </div>

  </div>

</div>

<!-- MAIN SECTIONS BELOW HERO -->
<section class="home-sections">
  {% include home-sections.html %}
</section>

<footer class="site-footer">
  {% include footer.html %}
</footer>

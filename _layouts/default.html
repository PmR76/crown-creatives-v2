<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | Crown Creatives</title>

  <!-- Main Stylesheet (v4) -->
  <link rel="stylesheet" href="{{ '/assets/css/style-v4.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ '/assets/icons/favicon.ico' | relative_url }}">
</head>

<body>

  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header class="site-header">

    <!-- Theme Toggle -->
    <button class="theme-toggle" aria-label="Toggle theme">
      <img src="{{ '/assets/icons/sun-moon-magic.svg' | relative_url }}"
           alt="Theme toggle icon"
           class="theme-icon">
    </button>

    <!-- Header Crown -->
    <div class="header-crown-wrapper">
      <img src="{{ '/assets/icons/day-crown.svg' | relative_url }}"
           alt="Crown Creatives Day Logo"
           class="crown crown-day">

      <img src="{{ '/assets/icons/night-crown.svg' | relative_url }}"
           alt="Crown Creatives Night Logo"
           class="crown crown-night">
    </div>

    <!-- Navigation -->
    <nav class="site-nav">
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/gallery/' | relative_url }}">Gallery</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
      </ul>
    </nav>

  </header>


  <!-- ============================================================
       PAGE CONTENT
       ============================================================ -->
  <main class="site-content">
    {{ content }}
  </main>


  <!-- ============================================================
       FOOTER
       ============================================================ -->
  <footer class="site-footer">

    <!-- Footer Icons -->
    <div class="footer-icons">
      <a href="mailto:info@crowncreatives.co.uk">
        <img src="{{ '/assets/icons/email-magic.svg' | relative_url }}" alt="Email">
      </a>

      <a href="https://www.instagram.com/" target="_blank">
        <img src="{{ '/assets/icons/instagram-magic.svg' | relative_url }}" alt="Instagram">
      </a>

      <a href="https://www.facebook.com/" target="_blank">
        <img src="{{ '/assets/icons/facebook-magic.svg' | relative_url }}" alt="Facebook">
      </a>
    </div>

    <!-- Back to Top -->
    <div class="footer-backtotop">
      <a href="#">
        <img src="{{ '/assets/icons/up-arrow-magic.svg' | relative_url }}" alt="Back to top">
      </a>
    </div>

  </footer>


  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="{{ '/assets/js/magic.js' | relative_url }}"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  {% include head.html %}
</head>

<body>

  <!-- ⭐ MAGICAL BACKGROUND ENGINE -->
  <div class="cc-background">

    <!-- Day Gradient -->
    <div class="cc-background-layer cc-background-day"></div>

    <!-- Night Gradient -->
    <div class="cc-background-layer cc-background-night"></div>

    <!-- Shimmer -->
    <div class="cc-shimmer"></div>

    <!-- Sparkles -->
    <div class="cc-sparkles"></div>

    <!-- Aurora -->
    <div class="cc-aurora"></div>

    <!-- Nebula -->
    <div class="cc-nebula"></div>

    <!-- Starfield (night only) -->
    <div class="cc-stars"></div>

    <!-- Vignette -->
    <div class="cc-vignette"></div>

  </div>


  <!-- ⭐ HEADER -->
  {% include header.html %}


  <!-- ⭐ MAIN CONTENT -->
  <main class="site-main">
    {{ content }}
  </main>


  <!-- ⭐ FOOTER -->
  {% include footer.html %}


  <!-- ⭐ THEME TOGGLE SCRIPT -->
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute("data-theme");
      html.setAttribute("data-theme", current === "dark" ? "light" : "dark");
    }
  </script>

</body>
</html>

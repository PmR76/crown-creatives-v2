<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | Crown Creatives</title>

  <!-- MAIN STYLESHEET -->
  <link rel="stylesheet" href="{{ '/assets/css/style-v2.css?v=1.0.0' | relative_url }}">
</head>

<body id="top" data-theme="day">

  <!-- ⭐ MAGICAL BACKGROUND ENGINE (missing before — now fixed) -->
  <div class="cc-bg-magic-layer">
    <div class="cc-bg-nebula"></div>
    <div class="cc-bg-stars"></div>
    <div class="cc-bg-particles">
      <div class="cc-bg-particle p1"></div>
      <div class="cc-bg-particle p2"></div>
      <div class="cc-bg-particle p3"></div>
      <div class="cc-bg-particle p4"></div>
      <div class="cc-bg-particle p5"></div>
    </div>
  </div>

  <!-- HEADER INCLUDE -->
  {% include header.html %}

  <!-- MAIN CONTENT -->
  <main class="site-content">
    {{ content }}
  </main>

  <!-- FOOTER INCLUDE -->
  {% include footer.html %}

  <!-- BACKGROUND + THEME ENGINE JS -->
  <script src="{{ '/assets/js/magic.js' | relative_url }}"></script>

</body>
</html>

<header class="site-header">
  <div class="header-inner">

    <!-- BRAND + LOGO -->
    <a href="{{ '/' | relative_url }}" class="header-logo">

      <!-- Crown wrapper (day/night swap handled in CSS) -->
      <div class="header-crown-wrapper">
        <img src="{{ '/assets/icons/day-crown.svg' | relative_url }}" 
             class="crown crown-day" 
             alt="Crown Creatives Day Logo">

        <img src="{{ '/assets/icons/night-crown.svg' | relative_url }}" 
             class="crown crown-night" 
             alt="Crown Creatives Night Logo">
      </div>

      <!-- Brand text -->
      <div class="header-brand">
        <div class="header-brand-line-1">CROWN CREATIVES</div>
        <div class="header-brand-line-2">ARTISTRY • RESILIENCE • IMAGINATION</div>
      </div>

    </a>

    <!-- NAVIGATION -->
    <nav class="site-nav" aria-label="Main navigation">
      <ul class="nav-list">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/about/' | relative_url }}">About</a></li>
        <li><a href="{{ '/gallery/' | relative_url }}">Gallery</a></li>
        <li><a href="{{ '/projects/' | relative_url }}">Projects</a></li>
        <li><a href="{{ '/videos/' | relative_url }}">Videos</a></li>
        <li><a href="{{ '/podcasts/' | relative_url }}">Podcasts</a></li>
        <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
        <li><a href="{{ '/contact/' | relative_url }}">Contact</a></li>
      </ul>
    </nav>

    <!-- THEME TOGGLE -->
    <button class="theme-toggle" type="button" aria-label="Toggle theme">
      <img class="theme-icon" 
           src="{{ '/assets/icons/sun.svg' | relative_url }}" 
           alt="Toggle Theme">
    </button>

  </div>
</header>
